    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --branco:    #ffffff;
      --preta:     #0c0c0c;
      --off-white: #f8f9f4;
      --cinza:     #e3e5e1;
      --off-bege:  #c1beb0;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--branco);
      color: var(--preta);
      font-family: 'Paralucent', sans-serif;
      font-weight: 200;
      letter-spacing: 0.02em;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* Blocos decorativos */
    .block-topo { display: none; }
    .block-base { display: none; }

    /* Layout principal */
    .page {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 0 9vw;
    }

    /* Logo */
    .logo {
      width: 13%;
      min-width: 100px;
      margin-bottom: 52px;
    }

    /* Barra decorativa */
    .divider-bar {
      width: 2px;
      height: 36px;
      background: var(--preta);
      margin: 0 auto 52px;
    }

    /* Label */
    .label {
      font-family: 'Paralucent', sans-serif;
      font-weight: 200;
      font-size: 0.62rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      opacity: 0.45;
      margin-bottom: 18px;
    }

    /* Título */
    h1 {
      font-family: 'Minion Pro', Georgia, serif;
      font-style: italic;
      font-weight: 400;
      font-size: clamp(2.6rem, 5vw, 4.2rem);
      line-height: 1.1;
      margin-bottom: 28px;
    }

    /* Subtítulo */
    .sub {
      font-family: 'Paralucent', sans-serif;
      font-weight: 200;
      font-size: 0.88rem;
      line-height: 1.8;
      opacity: 0.65;
      max-width: 460px;
      margin: 0 auto 52px;
    }

    /* Botões */
    .actions {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      font-family: 'Paralucent', sans-serif;
      font-weight: 200;
      font-size: 0.72rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      padding: 14px 28px;
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.72; }

    .btn-dark {
      background: var(--preta);
      color: var(--branco);
    }

    .btn-outline {
      border: 1px solid rgba(12,12,12,0.3);
      color: var(--preta);
      background: transparent;
    }

    /* Ícone Instagram */
    .insta-link {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
      color: var(--preta);
      opacity: 0.5;
      transition: opacity 0.2s;
      margin-left: 8px;
    }
    .insta-link:hover { opacity: 1; }

    /* Rodapé */
    .rodape {
      position: fixed;
      bottom: 32px;
      left: 9vw;
      right: 9vw;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 32px;
      z-index: 1;
    }
    .rodape-txt {
      font-size: 0.6rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      opacity: 0.3;
    }

    /* Mobile */
    @media (max-width: 640px) {
      body { overflow: auto; }
      .block-base { display: none; }
      .block-topo { display: none; }
      .page { padding: 0 28px; height: auto; min-height: calc(100vh - 80px); padding-top: 48px; padding-bottom: 48px; }
      .logo { width: 28%; margin-bottom: 40px; }
      .divider-bar { margin-bottom: 40px; }
      .actions { flex-direction: column; align-items: center; gap: 12px; }
      .btn { width: 100%; justify-content: center; }
      .insta-link { margin-left: 0; }
      .rodape { position: relative; bottom: auto; left: auto; right: auto; padding: 32px 28px; }
    }
  </style>
